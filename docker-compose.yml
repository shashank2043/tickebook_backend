services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:

      # KRaft mode
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # controller quorum
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # listeners
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      # protocol mapping
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      # controller settings
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # cluster id
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      # auto create topics
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9092" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: auth_db
      MYSQL_USER: shashank
      MYSQL_PASSWORD: Shashank@123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10
  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: config-server
    ports:
      - "8888:8888"
    environment:
      GIT_TOKEN: ${GIT_TOKEN}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth-service
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: discovery-server
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  monitoring-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: monitoring-service
    ports:
      - "9090:9090"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  admin-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: admin-service
    ports:
      - "8082:8080"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
  consumer-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: consumer-service
    ports:
      - "8083:8080"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
  mail-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: mail-server
    ports:
      - "8090:8080"
    environment:
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
  movie-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: movie-service
    ports:
      - "8084:8080"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: payment-service
    ports:
      - "8085:8080"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
  show-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: show-service
    ports:
      - "8086:8080"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
  theatre-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: theatre-service
    ports:
      - "8087:8080"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
volumes:
  mysql_data: