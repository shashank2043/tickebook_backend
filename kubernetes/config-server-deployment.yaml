apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\minikube\kompose.exe convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: config-server
  name: config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: config-server
  template:
    metadata:
      annotations:
        kompose.cmd: C:\minikube\kompose.exe convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: config-server
    spec:
      containers:
        - env:
            - name: GIT_TOKEN
              value: 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
            - name: SPRING_PROFILES_ACTIVE
              value: docker
          image: shashank2043/tickebook_backend-config-server:latest
          livenessProbe:
            exec:
              command:
                - curl
                - -f
                - http://localhost:8888/actuator/health
            failureThreshold: 10
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          name: config-server
          ports:
            - containerPort: 8888
              protocol: TCP
      restartPolicy: Always
