apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\minikube\kompose.exe convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: theatre-service
  name: theatre-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: theatre-service
  template:
    metadata:
      annotations:
        kompose.cmd: C:\minikube\kompose.exe convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: theatre-service
    spec:
      containers:
        - env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
          image: shashank2043/tickebook_backend-theatre-service:latest
          name: theatre-service
          ports:
            - containerPort: 8080
              protocol: TCP
      restartPolicy: Always
